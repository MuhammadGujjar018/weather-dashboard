<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <meta name="description" content="A simple weather app that allows users to search for current weather conditions in any city.">
    <meta name="keywords" content="weather, app, current weather, city weather, weather forecast">
    <meta name="author" content="Muhammad Bin Hammad">
    <link rel="icon" type="image/x-icon" href="0dd73ba7-986f-4e01-8b51-7ef5f1c92c34.jpg">
    <title>Weather App</title>
</head>
<body>
    <header>
    <div id="navbar">
        <h2>Weather App</h2>
    </div>
    </header>
    <main>
        
    <div id="search-container">
        <input type="text" id="city-input">
        <button id="search-button">Search</button>
    </div>
   
    <div id="weather-display"></div>

            <!-- Weather information will be displayed here -->
        </div>
        <div class="loader"></div>
        <div id="more-info">
            <!-- Additional information will be displayed here -->
        </div>
        <div id="error-message">
            <!-- Error messages will be displayed here -->
        </div>
    </main>
    <footer>
        <p>Made with ❤️</p>

    </footer>
    <script src="api.js"></script>

</html>
